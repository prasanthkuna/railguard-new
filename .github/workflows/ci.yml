name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Install dependencies
        run: make contracts-deps
      - name: Forge fmt check
        run: cd contracts && forge fmt --check
      - name: Forge build
        run: cd contracts && forge build
      - name: Forge test
        run: cd contracts && forge test -vvv

  go-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: cd signgate && go test ./...

  opa-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: open-policy-agent/setup-opa@v2
      - run: opa test policy/

  differential-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: railguard-new
          submodules: recursive
      - uses: actions/checkout@v4
        with:
          repository: prasanthkuna/x402-guard
          path: x402-guard
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install contract dependencies
        run: cd railguard-new && make contracts-deps
      - name: Cross-language sessionId + EIP-712 vectors
        run: |
          cd railguard-new/contracts && forge test --match-path "test/*Vector.t.sol" -vv
          cd ../signgate && go test ./internal/session ./internal/eip712 ./internal/policy -run "CrossLanguage|PhysicalVectors"
          cd ../../x402-guard && npm ci && npm run build
          cd ../railguard-new/sdk && npm ci && npm test -- sessionId eip712 receiptHash

  typescript-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: railguard-new
      - uses: actions/checkout@v4
        with:
          repository: prasanthkuna/x402-guard
          path: x402-guard
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build x402-guard
        run: cd x402-guard && npm ci && npm run build
      - name: SDK build and test
        run: cd railguard-new/sdk && npm ci && npm run build && npm test

  failure-lab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: railguard-new
      - uses: actions/checkout@v4
        with:
          repository: prasanthkuna/x402-guard
          path: x402-guard
      - uses: actions/checkout@v4
        with:
          repository: prasanthkuna/railguard-cdp
          path: coinbase
      - uses: actions/checkout@v4
        with:
          repository: prasanthkuna/agent-payment-failure-lab
          path: agent-payment-failure-lab
      - uses: actions/checkout@v4
        with:
          repository: prasanthkuna/gnu-taler-merchant-reliability-lab
          path: gnu-taler-merchant-reliability-lab
      - uses: actions/checkout@v4
        with:
          repository: prasanthkuna/stellar-payment-assurance-kit
          path: stellar-payment-assurance-kit
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install lab dependencies
        run: |
          ROOT="${GITHUB_WORKSPACE}"
          cd "$ROOT/x402-guard" && npm ci && npm run build
          cd "$ROOT/agent-payment-failure-lab" && npm ci
          cd "$ROOT/gnu-taler-merchant-reliability-lab" && npm ci
          cd "$ROOT/stellar-payment-assurance-kit" && npm ci
          ln -sfn "$ROOT/x402-guard" "$ROOT/coinbase/x402-guard"
          cd "$ROOT/coinbase" && bun install
      - name: Run failure lab (unit profiles)
        run: cd railguard-new && bash scripts/failure-lab.sh
